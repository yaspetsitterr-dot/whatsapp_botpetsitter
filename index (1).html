<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fale com a gente 🐾</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --sand: #FAF6EE;
    --sand-deep: #F0E9D8;
    --sage: #5B7C6B;
    --sage-deep: #3F5A4C;
    --honey: #D98E4A;
    --ink: #2B2B26;
    --ink-soft: #6B675E;
    --white: #FFFFFF;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--sand);
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 22px 20px 18px;
    background: var(--sage);
    color: var(--white);
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 12px rgba(63, 90, 76, 0.25);
    z-index: 2;
  }

  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 999px;
    background: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
    padding: 3px;
  }

  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 999px;
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-size: 19px;
    font-weight: 600;
    margin: 0;
    line-height: 1.2;
  }

  header p {
    margin: 2px 0 0;
    font-size: 12.5px;
    opacity: 0.85;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 999px;
    background: #8FE3A8;
    display: inline-block;
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .msg {
    max-width: 78%;
    padding: 12px 16px;
    font-size: 15px;
    line-height: 1.5;
    animation: rise 0.25s ease;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.bot {
    align-self: flex-start;
    background: var(--white);
    border: 1px solid var(--sand-deep);
    border-radius: 4px 18px 18px 18px;
    color: var(--ink);
  }

  .msg.user {
    align-self: flex-end;
    background: var(--sage);
    color: var(--white);
    border-radius: 18px 4px 18px 18px;
  }

  .typing {
    align-self: flex-start;
    display: flex;
    gap: 5px;
    padding: 14px 18px;
    background: var(--white);
    border: 1px solid var(--sand-deep);
    border-radius: 4px 18px 18px 18px;
  }

  .typing span {
    font-size: 14px;
    animation: bounce 1.1s infinite;
    opacity: 0.35;
  }

  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.35; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  form {
    display: flex;
    gap: 10px;
    padding: 14px 16px calc(14px + env(safe-area-inset-bottom));
    background: var(--white);
    border-top: 1px solid var(--sand-deep);
  }

  #input {
    flex: 1;
    border: 1.5px solid var(--sand-deep);
    background: var(--sand);
    border-radius: 24px;
    padding: 12px 18px;
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s ease;
  }

  #input:focus {
    border-color: var(--sage);
  }

  button[type="submit"] {
    width: 46px;
    height: 46px;
    border-radius: 999px;
    border: none;
    background: var(--honey);
    color: var(--white);
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
    transition: transform 0.12s ease, filter 0.12s ease;
  }

  button[type="submit"]:hover {
    filter: brightness(1.06);
  }

  button[type="submit"]:active {
    transform: scale(0.93);
  }

  button[type="submit"]:disabled {
    opacity: 0.5;
    cursor: default;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--sand-deep); border-radius: 999px; }
</style>
</head>
<body>

<header>
  <div class="avatar"><img src="{{ url_for('static', filename='logo.png') }}" alt="Logo Yas Pet Sitter"></div>
  <div>
    <h1>Assistente da Yas Pet Sitter</h1>
    <p><span class="dot"></span> online agora</p>
  </div>
</header>

<div id="chat"></div>

<form id="form">
  <input id="input" type="text" placeholder="Escreva sua mensagem..." autocomplete="off" />
  <button type="submit" aria-label="Enviar">➤</button>
</form>

<script>
  const chat = document.getElementById('chat');
  const form = document.getElementById('form');
  const input = document.getElementById('input');
  const button = form.querySelector('button');

  // Identifica esse visitante de forma simples, sem precisar de login
  let sessionId = localStorage.getItem('petsitter_session_id');
  if (!sessionId) {
    sessionId = 'web-' + Math.random().toString(36).slice(2, 12);
    localStorage.setItem('petsitter_session_id', sessionId);
  }

  function addMessage(text, sender) {
    const div = document.createElement('div');
    div.className = 'msg ' + sender;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typing-indicator';
    div.innerHTML = '<span>🐾</span><span>💜</span><span>🐾</span>';
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  // Mensagem de boas-vindas
  addMessage('Oi! 💜🐾 Eu sou o assistente virtual da Yas Pet Sitter. Como posso ajudar você e seu bichinho hoje?', 'bot');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, 'user');
    input.value = '';
    button.disabled = true;
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, session_id: sessionId })
      });
      const data = await res.json();
      hideTyping();
      addMessage(data.reply || 'Desculpa, algo deu errado. Tenta de novo?', 'bot');
    } catch (err) {
      hideTyping();
      addMessage('Não consegui responder agora. Verifique sua conexão e tente de novo.', 'bot');
    } finally {
      button.disabled = false;
      input.focus();
    }
  });
</script>

</body>
</html>
